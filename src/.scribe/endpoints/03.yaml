name: '4. Financial Data'
description: |-

  Endpoints for generating and validating Spanish financial and banking data.
endpoints:
  -
    httpMethods:
      - GET
    uri: api/generate-iban
    metadata:
      groupName: '4. Financial Data'
      groupDescription: |-

        Endpoints for generating and validating Spanish financial and banking data.
      subgroup: ''
      subgroupDescription: ''
      title: 'Generate a valid Spanish IBAN.'
      description: |-
        Permission: Only authenticated users can access this endpoint.
        Generates a random but structurally valid Spanish IBAN following ISO 13616 and the CCC standard.
        The BBAN (20 digits) is composed of: bank code (4) + branch code (4) + CCC control digits (2) + account number (10).
        The 2 IBAN check digits are computed via MOD-97. The CCC control digits are computed via MOD-11.
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {YOUR_AUTH_KEY}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "iban": "ES7921000813610123456789",
            "formatted": "ES79 2100 0813 6101 2345 6789",
            "components": {
              "country": "ES",
              "check_digits": "79",
              "bank_code": "2100",
              "branch_code": "0813",
              "control_digits": "61",
              "account_number": "0123456789"
            }
          }
        headers: []
        description: 'IBAN generado correctamente'
        custom: []
      -
        status: 401
        content: '{"message": "Unauthenticated."}'
        headers: []
        description: ''
        custom: []
      -
        status: 500
        content: '{"message": "Internal Server Error"}'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 3V5EgbkvZcDPa166h8fd4ae'
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - GET
    uri: api/validate-iban
    metadata:
      groupName: '4. Financial Data'
      groupDescription: |-

        Endpoints for generating and validating Spanish financial and banking data.
      subgroup: ''
      subgroupDescription: ''
      title: 'Validate a Spanish IBAN.'
      description: |-
        Permission: Only authenticated users can access this endpoint.


        Validates a Spanish IBAN string checking: correct length (24 chars), ES country prefix,
        MOD-97 checksum (ISO 13616), and CCC internal control digits (MOD-11).
        Spaces in the input are ignored, allowing both compact and formatted IBANs.
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {YOUR_AUTH_KEY}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      iban:
        name: iban
        description: 'The IBAN to validate. Spaces are ignored.'
        required: true
        example: 'ES79 2100 0813 6101 2345 6789'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanQueryParameters:
      iban: 'ES79 2100 0813 6101 2345 6789'
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "iban": "ES7921000813610123456789",
            "formatted": "ES79 2100 0813 6101 2345 6789",
            "valid": true,
            "message": "VALIDO",
            "components": {
              "country": "ES",
              "check_digits": "79",
              "bank_code": "2100",
              "branch_code": "0813",
              "control_digits": "61",
              "account_number": "0123456789"
            }
          }
        headers: []
        description: 'IBAN válido'
        custom: []
      -
        status: 200
        content: |-
          {
            "iban": "ES0000000000000000000000",
            "formatted": null,
            "valid": false,
            "message": "Los dígitos de control IBAN no son válidos (falla MOD-97).",
            "components": null
          }
        headers: []
        description: 'IBAN inválido'
        custom: []
      -
        status: 400
        content: '{"message": "El parámetro ''iban'' es requerido."}'
        headers: []
        description: ''
        custom: []
      -
        status: 401
        content: '{"message": "Unauthenticated."}'
        headers: []
        description: ''
        custom: []
      -
        status: 500
        content: '{"message": "Internal Server Error"}'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 3V5EgbkvZcDPa166h8fd4ae'
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - GET
    uri: api/generate-cuenta
    metadata:
      groupName: '4. Financial Data'
      groupDescription: |-

        Endpoints for generating and validating Spanish financial and banking data.
      subgroup: ''
      subgroupDescription: ''
      title: 'Generate a valid Spanish bank account number (CCC).'
      description: |-
        Permission: Only authenticated users can access this endpoint.
        Generates a random CCC (Código Cuenta Cliente) with valid MOD-11 control digits.
        The CCC is the BBAN part of the Spanish IBAN: bank(4) + branch(4) + control(2) + account(10).
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {YOUR_AUTH_KEY}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "ccc": "21000813610123456789",
            "formatted": "2100-0813-61-0123456789",
            "components": {
              "bank_code": "2100",
              "branch_code": "0813",
              "control_digits": "61",
              "account_number": "0123456789"
            }
          }
        headers: []
        description: 'Cuenta generada correctamente'
        custom: []
      -
        status: 401
        content: '{"message": "Unauthenticated."}'
        headers: []
        description: ''
        custom: []
      -
        status: 500
        content: '{"message": "Internal Server Error"}'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 3V5EgbkvZcDPa166h8fd4ae'
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - GET
    uri: api/generate-tarjeta
    metadata:
      groupName: '4. Financial Data'
      groupDescription: |-

        Endpoints for generating and validating Spanish financial and banking data.
      subgroup: ''
      subgroupDescription: ''
      title: 'Generate a valid credit card number.'
      description: |-
        Permission: Only authenticated users can access this endpoint.
        Generates a random credit card number using the Luhn algorithm.
        Supported types: VISA (16 digits, prefix 4xxx), MASTERCARD (16 digits, prefix 51-55xx),
        AMEX (15 digits, prefix 34xx or 37xx). If no type is provided, one is chosen at random.
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {YOUR_AUTH_KEY}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      type:
        name: type
        description: 'optional Tipo de tarjeta. Valores válidos: VISA, MASTERCARD, AMEX. Si se omite, se elige aleatoriamente.'
        required: false
        example: VISA
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanQueryParameters:
      type: VISA
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "card_number": "4532123456789010",
            "formatted": "4532 1234 5678 9010",
            "type": "VISA",
            "expiry": "08/28",
            "cvv": "123",
            "components": {
              "prefix": "4532",
              "length": 16,
              "network": "Visa International"
            }
          }
        headers: []
        description: 'Tarjeta VISA generada'
        custom: []
      -
        status: 200
        content: |-
          {
            "card_number": "378282246310005",
            "formatted": "3782 822463 10005",
            "type": "AMEX",
            "expiry": "11/27",
            "cvv": "1234",
            "components": {
              "prefix": "3782",
              "length": 15,
              "network": "American Express"
            }
          }
        headers: []
        description: 'Tarjeta AMEX generada'
        custom: []
      -
        status: 400
        content: '{"message": "Tipo no válido. Tipos soportados: VISA, MASTERCARD, AMEX."}'
        headers: []
        description: ''
        custom: []
      -
        status: 401
        content: '{"message": "Unauthenticated."}'
        headers: []
        description: ''
        custom: []
      -
        status: 500
        content: '{"message": "Internal Server Error"}'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 3V5EgbkvZcDPa166h8fd4ae'
    controller: null
    method: null
    route: null
    custom: []
